services:
  - type: web
    name: streetvault
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    healthCheckPath: /
    disk:
      name: streetvault-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # Match .env.example / app code (AUTH_SECRET is required for sessions)
      - key: AUTH_SECRET
        sync: false
      # Public site URL(s) — set to your Render URL or custom domain
      - key: APP_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: SITE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        sync: false
      - key: EMAIL_SMTP_USER
        sync: false
      - key: EMAIL_SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
